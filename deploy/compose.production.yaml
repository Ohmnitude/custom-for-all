services:
  form:
    image: custom-for-all-form:local
    container_name: custom-for-all-form
    restart: "on-failure:5"
    init: true
    user: "10001:10001"
    env_file:
      - ${CFA_FORM_ENV_FILE:-/etc/custom-for-all/form.env}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - /srv/client-sites/custom-for-all/data:/app/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cfa-form
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  cfa-form:
    name: cfa-form
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.250.0/28

